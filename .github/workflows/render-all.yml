name: Render metrics for selected targets

on:
  schedule:
    - cron: "19 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup IMIR
        uses: ./.github/actions/setup-imir
        with:
          token: ${{ secrets.CLASSIC }}

      - name: Generate render targets
        id: generate
        run: |
          set -euo pipefail
          MATRIX="$(imir --config targets/targets.yaml)"
          printf 'matrix=%s\n' "${MATRIX}" >> "${GITHUB_OUTPUT}"

  render:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.matrix).targets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Render profile target
        if: ${{ matrix.target.kind == 'profile' }}
        uses: ./.github/actions/render-profile
        with:
          classic_token: ${{ secrets.CLASSIC }}
          target_user: ${{ matrix.target.owner }}
          branch_name: ${{ matrix.target.branch_name }}
          target_path: ${{ matrix.target.target_path }}
          temp_artifact: ${{ matrix.target.temp_artifact }}
          time_zone: ${{ matrix.target.time_zone }}
          display_name: ${{ matrix.target.display_name }}

      - name: Render repository target
        if: ${{ matrix.target.kind != 'profile' }}
        uses: ./.github/actions/render-repository
        with:
          classic_token: ${{ secrets.CLASSIC }}
          target_owner: ${{ matrix.target.owner }}
          target_repo: ${{ matrix.target.repository }}
          branch_name: ${{ matrix.target.branch_name }}
          contributors_branch: ${{ matrix.target.contributors_branch }}
          target_path: ${{ matrix.target.target_path }}
          temp_artifact: ${{ matrix.target.temp_artifact }}
          time_zone: ${{ matrix.target.time_zone }}

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ matrix.target.slug || matrix.target.repository || matrix.target.kind }}
          path: ${{ matrix.target.target_path }}
          retention-days: 1

  commit:
    needs: [prepare, render]
    if: always() && needs.render.result != 'cancelled' && needs.render.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download all metrics artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: metrics-*
          path: artifacts

      - name: Move artifacts to metrics directory
        run: |
          set -euo pipefail
          find artifacts -name '*.svg' -exec cp {} metrics/ \;

      - name: Commit and push all metrics
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true

          git add metrics/

          if git diff --cached --quiet; then
            echo "No metrics changes to commit."
            exit 0
          fi

          git commit -m "chore(metrics): refresh all targets"

          # Pull latest changes and retry push up to 3 times
          for i in {1..3}; do
            git pull origin main --rebase && git push origin HEAD:main && break || sleep 5
          done
